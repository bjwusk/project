<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f5f0"/>
      <stop offset="50%" style="stop-color:#f0ebe3"/>
      <stop offset="100%" style="stop-color:#e8e0d3"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#heroBg)"/>
  <ellipse cx="200" cy="500" rx="180" ry="40" fill="#d4c8b8" opacity="0.3"/>
  <ellipse cx="700" cy="520" rx="250" ry="50" fill="#d4c8b8" opacity="0.2"/>
  <!-- Dog silhouette left -->
  <g transform="translate(100, 150)">
    <ellipse cx="60" cy="120" rx="55" ry="40" fill="#c4a882"/>
    <circle cx="100" cy="80" r="35" fill="#c4a882"/>
    <ellipse cx="30" cy="100" rx="25" ry="18" fill="#b89872"/>
    <ellipse cx="110" cy="55" rx="15" ry="10" fill="#b89872"/>
    <circle cx="90" cy="75" r="4" fill="#3a3028"/>
    <circle cx="110" cy="75" r="4" fill="#3a3028"/>
    <ellipse cx="100" cy="88" rx="6" ry="4" fill="#5a4a38"/>
  </g>
  <!-- Cat silhouette right -->
  <g transform="translate(850, 140)">
