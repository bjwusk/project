    <circle cx="75" cy="75" r="30" fill="#8a7a6a"/>
    <polygon points="75,50 65,30 70,50" fill="#8a7a6a"/>
    <polygon points="75,50 80,30 85,50" fill="#8a7a6a"/>
    <ellipse cx="95" cy="60" rx="12" ry="8" fill="#6a5a4a"/>
