    <rect x="550" y="420" width="25" height="7" rx="3" fill="#7ab87a" transform="rotate(10 562 423)"/>
    <rect x="620" y="390" width="28" height="8" rx="4" fill="#d49494" transform="rotate(-25 634 394)"/>
    <rect x="500" y="430" width="22" height="6" rx="3" fill="#8ab8d4" transform="rotate(20 511 433)"/>
